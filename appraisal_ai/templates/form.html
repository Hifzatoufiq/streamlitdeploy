
{% extends 'base.html' %}
{% block content %}

<h2>New Appraisal</h2>

<form method="post">
Name:<br>
<input name="name" required><br>

Working Days:<br>
<input name="working" type="number" required><br>

Present:<br>
<input name="present" type="number" required><br>

Leave:<br>
<input name="leave" type="number" required><br>

Performance Score (50-80):<br>
<input name="performance" type="number" step="0.1" required><br><br>

<button type="submit">Calculate</button>
</form>

{% endblock %}
